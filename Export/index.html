<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tank Game</title>
  <link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>
<link rel="manifest" href="index.manifest.json">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:     #060708;
      --steel:   #181c22;
      --rivet:   #252c36;
      --scratch: #38424e;
      --chrome:  #58666e;
    }
    html, body { width:100%; height:100%; background:var(--ink); overflow:hidden; }
    #canvas-wrapper { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#000; }
    #canvas { display:block; width:100%; height:100%; outline:none; opacity:0; transition:opacity .3s; image-rendering:pixelated; }
    #canvas.show { opacity:1; }
    #overlay { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:var(--ink); transition:opacity .4s; z-index:10; }
    #overlay.hide { opacity:0; pointer-events:none; }
    #bar-outer { width:min(320px,60vw); height:6px; background:var(--steel); border:2px solid var(--rivet); position:relative; overflow:hidden; }
    #bar-outer::before { content:''; position:absolute; inset:0; z-index:2; pointer-events:none; background:repeating-linear-gradient(90deg, transparent 0px, transparent 5px, rgba(0,0,0,.3) 5px, rgba(0,0,0,.3) 6px); }
    #bar-outer::after { content:''; position:absolute; top:0; left:-50%; width:50%; height:100%; background:linear-gradient(90deg,transparent,rgba(180,200,210,.15),transparent); animation:scan 2s linear infinite; z-index:1; }
    @keyframes scan { to { left:150%; } }
    #bar-fill { height:100%; width:0%; background:repeating-linear-gradient(90deg, var(--chrome) 0px, var(--chrome) 5px, var(--scratch) 5px, var(--scratch) 6px); box-shadow:0 0 6px var(--chrome); transition:width .18s steps(20,end); position:relative; z-index:3; }
  </style>
</head>
<body>
  <div id="canvas-wrapper">
    <canvas id="canvas" oncontextmenu="return false;"></canvas>
  </div>
  <div id="overlay">
    <div id="bar-outer"><div id="bar-fill"></div></div>
  </div>

  <script src="index.js"></script>
  <script>
    const overlay = document.getElementById('overlay');
    const canvas  = document.getElementById('canvas');
    const barFill = document.getElementById('bar-fill');
    

    (async () => {
      try {
        const engine = new Engine({"args":[],"canvasResizePolicy":1,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":2849188,"index.wasm":35739700},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4,"serviceWorker":"index.service.worker.js"});
        await engine.startGame({
          canvas,
          onProgress(current, total) {
            if (total > 0) {
              barFill.style.width = Math.round((current / total) * 100) + '%';
            }
          },
        });
        barFill.style.width = '100%';
        setTimeout(() => {
          overlay.classList.add('hide');
          canvas.classList.add('show');
        }, 400);
      } catch (err) {
        console.error('[SHELL] startGame error:', err);
      }
    })();
  </script>
</body>
</html>
